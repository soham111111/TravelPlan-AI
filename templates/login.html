<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – TravelPlan</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="center">

    <div class="card auth">
        <div style="text-align:center; margin-bottom: 1.5rem;">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">✈️</div>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-light); font-size: 0.95rem; margin-top: 0.25rem;">Sign in to continue your
                journey</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div style="margin-bottom: 0.25rem;">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Your username" required
                    autocomplete="username">
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required
                    autocomplete="current-password">
            </div>
            <button type="submit" style="width: 100%; border-radius: 9999px;">Sign In →</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light); font-size: 0.9rem;">
            New here? <a href="/signup" style="color: var(--teal); font-weight: 700; text-decoration: none;">Create a
                free account</a>
        </p>
        <p style="text-align: center; margin-top: 0.5rem;">
            <a href="/" style="color: var(--text-light); font-size: 0.85rem; text-decoration: none;">← Back to Home</a>
        </p>
    </div>

    <div id="chatbot"></div>
    <script src="/static/chatbot.js"></script>
</body>

</html>
