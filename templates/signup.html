<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – TravelPlan</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="center">

    <div class="card auth">
        <div style="text-align:center; margin-bottom: 1.5rem;">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🌍</div>
            <h2>Start Exploring</h2>
            <p style="color: var(--text-light); font-size: 0.95rem; margin-top: 0.25rem;">Create your free TravelPlan
                account</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div style="margin-bottom: 0.25rem;">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required
                    autocomplete="username">
            </div>
            <div style="margin-bottom: 0.25rem;">
                <label for="email">Email <span
                        style="font-weight:400; color: var(--text-light);">(optional)</span></label>
                <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email">
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 4 characters" required
                    autocomplete="new-password" minlength="4">
            </div>
            <button type="submit" style="width: 100%; border-radius: 9999px;">Create Account →</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light); font-size: 0.9rem;">
            Already have an account? <a href="/login"
                style="color: var(--teal); font-weight: 700; text-decoration: none;">Sign in</a>
        </p>
        <p style="text-align: center; margin-top: 0.5rem;">
            <a href="/" style="color: var(--text-light); font-size: 0.85rem; text-decoration: none;">← Back to Home</a>
        </p>
    </div>

    <div id="chatbot"></div>
    <script src="/static/chatbot.js"></script>
</body>

</html>
